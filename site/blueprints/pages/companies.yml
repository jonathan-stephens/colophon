title: Companies
preset: pages
icon: building

# Define the form layout with two columns
# More about columns: https://getkirby.com/docs/guide/blueprints/layout#defining-columns

tabs:
  entries:
    label: Companies
    sections:
      drafts:
        headline: Drafts
        type: pages
        status: draft
        template: company
        sortBy: date desc

      published:
        label: Published
        type: pages
        status: listed
        template: company
        sortBy: date desc
        info: "{{ page.date.toDate('Y-m-d') }}"

  extends: tabs/listing
          