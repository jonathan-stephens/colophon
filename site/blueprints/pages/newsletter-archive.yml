title: Newsletter Archive
icon: bullhorn

tabs:
  content:
    label: Content
    icon: grid-full
    columns:
      main:
        width: 2/3
        sections:
          content:
            type: fields
            fields:
              hed:
                type: text
                label: Header
                max: 36
              dek:
                type: text
                label: Subtitle
                max: 72
              text:
                label: Introduction
                type: writer
                nodes:
                  - paragraph
                  - bulletList
                  - orderedList
                marks:
                  - bold
                  - italic
                  - link

          posts:
            type: pages
            label: Issues
            status: all
            template: newsletter
            sortBy: datetime desc
            info: "{{ page.newsletter.or('—') }} · {{ page.datetime.toDate('Y-m-d').or('No date') }}"

      sidebar:
        width: 1/3
        sections:
          uploads:
            label: Import Files
            type: files
            info: "Upload emails.csv and all .md files here before importing"