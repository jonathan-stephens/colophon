title: Newsletter Post
icon: bullhorn

tabs:
  content:
    label: Content
    icon: grid-full
    columns:
      main:
        width: 2/3
        sections:
          content:
            type: fields
            fields:
              hed:
                type: text
                label: Header
                max: 36
              dek:
                type: text
                label: Subtitle
                max: 72
              text:
                label: Content
                type: textarea
                size: large
                buttons:
                  - headlines
                  - bold
                  - italic
                  - link
                  - email
                  - file
                  - code
                  - ul
                  - ol
                  - table
                  - abbr
                  - cite
                  - dfn
                  - ins
                  - mark
                  - q
                  - s
                  - samp
                  - smallcaps
                  - sub
                  - sup
          metadata:
            type: fields
            fields:
              metadata: fields/metadata

      sidebar:
        width: 1/3
        sections:
          publication:
            type: fields
            label: Publication
            fields:
              newsletter:
                label: Newsletter
                type: select
                required: true
                options:
                  500-words: 500 Words
                  500-characters: 500 Characters
                  craft-and-practice: Craft & Practice
                  weekly-wanders: Weekly Wanders

          syndication:
            type: fields
            label: Syndication
            fields:
              syndication: fields/syndication